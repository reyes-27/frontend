version: '3.9'

services:
  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

    
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    command: yarn dev --host 0.0.0.0 
    networks:
      - shared_network

networks:
  shared_network:
    external: true